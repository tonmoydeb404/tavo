name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @workspace/extension typecheck

      - name: Lint
        run: pnpm --filter @workspace/extension lint

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Build extension
        run: pnpm --filter @workspace/extension build

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependency packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Zip Chrome extension
        run: pnpm --filter @workspace/extension zip

      - name: Upload ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: apps/extension/.output/Tavo-*-chrome.zip
