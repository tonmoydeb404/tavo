name: CI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 11.15.0
  NODE_VERSION: "22"

jobs:
  ci:
    name: Lint, Typecheck, Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter extension lint

      - name: Typecheck
        run: pnpm --filter extension typecheck

      - name: Build
        run: pnpm --filter extension build

      - name: Package extension (Chrome)
        run: pnpm --filter extension zip

      - name: Upload extension artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: apps/extension/.output/chrome-mv3-*.zip
          if-no-files-found: ignore
          retention-days: 14
